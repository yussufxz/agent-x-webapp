<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservations - The Obsidian Grill</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background: linear-gradient(to right, #0f2027, #203a43, #2c5364) }
        .navbar { backdrop-blur-md bg-white/10 }
        h1, h2, h3 { font-family: 'Playfair Display', serif; }
    </style>
</head>
<body class="text-gray-100">
    <header class="navbar fixed top-0 w-full flex items-center justify-between p-4 bg-transparent backdrop-blur-md">
        <div class="text-2xl font-bold">The Obsidian Grill</div>
        <nav>
            <ul class="flex space-x-8">
                <li><a href="index.html" class="hover:text-gray-300 transition-all duration-500">Home</a></li>
                <li><a href="menu.html" class="hover:text-gray-300 transition-all duration-500">Menu</a></li>
                <li><a href="reservations.html" class="hover:text-gray-300 transition-all duration-500">Reservations</a></li>
            </ul>
        </nav>
    </header>
    <main class="pt-24">
        <section class="py-20">
            <h1 class="text-5xl font-bold text-center hover:scale-105 hover:shadow-2xl transition-all duration-500">Make a Reservation</h1>
            <form class="mt-12 max-w-xl mx-auto space-y-4 text-black">
                <div>
                    <label for="name" class="block text-sm font-medium text-gray-100">Name</label>
                    <input type="text" id="name" class="w-full p-3 rounded-lg shadow-md" placeholder="Your Name">
                </div>
                <div>
                    <label for="date" class="block text-sm font-medium text-gray-100">Date</label>
                    <input type="date" id="date" class="w-full p-3 rounded-lg shadow-md">
                </div>
                <div>
                    <label for="time" class="block text-sm font-medium text-gray-100">Time</label>
                    <input type="time" id="time" class="w-full p-3 rounded-lg shadow-md">
                </div>
                <button type="submit" class="mt-4 w-full py-3 bg-gradient-to-r from-purple-600 to-red-600 text-white rounded-full transition-all duration-500 hover:scale-105 hover:shadow-xl">Reserve Now</button>
            </form>
        </section>
    </main>
</body>
</html>
