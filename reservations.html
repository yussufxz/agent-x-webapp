<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Obsidian Grill | Reservations</title><link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet"><style>@import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap');body {font-family: 'Roboto', sans-serif;}</style></head><body class="bg-gray-900 text-white"><header><nav class="bg-gray-800 p-4"><div class="container mx-auto flex justify-between items-center"><a href="index.html" class="text-2xl text-gold font-bold">The Obsidian Grill</a><div class="flex space-x-4"><a href="index.html" class="hover:text-gold transition ease-in-out duration-500">Home</a><a href="menu.html" class="hover:text-gold transition ease-in-out duration-500">Menu</a><a href="reservations.html" class="hover:text-gold transition ease-in-out duration-500">Reservations</a><a href="contact.html" class="hover:text-gold transition ease-in-out duration-500">Contact</a></div></div></nav></header><main><section class="container mx-auto py-8"><h2 class="text-4xl text-gold font-bold mb-6 text-center">Book a Table</h2><form class="bg-gray-800 p-8 rounded"><div class="flex flex-wrap mb-4"><div class="w-full md:w-1/2 px-2"><label class="block mb-2 text-gold" for="name">Name</label><input class="w-full px-4 py-2 rounded bg-gray-900 text-white" type="text" id="name" placeholder="Your full name"></div><div class="w-full md:w-1/2 px-2"><label class="block mb-2 text-gold" for="email">Email</label><input class="w-full px-4 py-2 rounded bg-gray-900 text-white" type="email" id="email" placeholder="Your email"></div></div><div class="flex flex-wrap mb-4"><div class="w-full md:w-1/2 px-2"><label class="block mb-2 text-gold" for="date">Date</label><input class="w-full px-4 py-2 rounded bg-gray-900 text-white" type="date" id="date"></div><div class="w-full md:w-1/2 px-2"><label class="block mb-2 text-gold" for="time">Time</label><input class="w-full px-4 py-2 rounded bg-gray-900 text-white" type="time" id="time"></div></div><div class="flex flex-wrap"><div class="w-full px-2"><label class="block mb-2 text-gold" for="guests">Number of Guests</label><input class="w-full px-4 py-2 rounded bg-gray-900 text-white" type="number" id="guests" min="1" max="20"></div></div><button class="mt-4 w-full py-2 px-4 bg-gold text-gray-900 font-bold rounded hover:bg-gray-700 transition duration-500">Reserve Now</button></form></section></main></body></html>
