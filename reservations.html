<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservations | The Obsidian Grill</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        .bg-dark { background-color: #1a1a1a; }
        .text-gold { color: #d4af37; }
        .highlight-on-hover:hover { transform: scale(1.05); }
    </style>
</head>
<body class="bg-dark text-white">
    <header class="fixed top-0 w-full bg-transparent backdrop-filter backdrop-blur-md shadow-md z-50">
        <nav class="max-w-6xl mx-auto p-4 flex justify-between">
            <a href="index.html" class="text-gold text-2xl font-bold">The Obsidian Grill</a>
            <div>
                <a href="index.html" class="mr-4 hover:text-gold transition">Home</a>
                <a href="menu.html" class="mr-4 hover:text-gold transition">Menu</a>
                <a href="reservations.html" class="hover:text-gold transition">Reservations</a>
            </div>
        </nav>
    </header>
    <main class="pt-24">
        <section class="max-w-6xl mx-auto py-16">
            <h2 class="text-gold text-4xl font-semibold text-center mb-8">Book Your Table</h2>
            <form class="bg-white text-dark p-8 rounded-lg shadow-md">
                <div class="mb-4">
                    <label for="name" class="block text-sm font-medium text-dark">Full Name</label>
                    <input type="text" id="name" class="mt-1 focus:ring-gold focus:border-gold block w-full shadow-sm sm:text-sm border-gray-300 rounded-md" placeholder="John Doe">
                </div>
                <div class="mb-4">
                    <label for="email" class="block text-sm font-medium text-dark">Email</label>
                    <input type="email" id="email" class="mt-1 focus:ring-gold focus:border-gold block w-full shadow-sm sm:text-sm border-gray-300 rounded-md" placeholder="john@example.com">
                </div>
                <div class="mb-4">
                    <label for="date" class="block text-sm font-medium text-dark">Date</label>
                    <input type="date" id="date" class="mt-1 focus:ring-gold focus:border-gold block w-full shadow-sm sm:text-sm border-gray-300 rounded-md">
                </div>
                <div class="mb-4">
                    <label for="time" class="block text-sm font-medium text-dark">Time</label>
                    <input type="time" id="time" class="mt-1 focus:ring-gold focus:border-gold block w-full shadow-sm sm:text-sm border-gray-300 rounded-md">
                </div>
                <button type="submit" class="px-4 py-2 bg-gold text-dark font-medium rounded-full shadow-md highlight-on-hover">Reserve</button>
            </form>
        </section>
    </main>
</body>
</html>
