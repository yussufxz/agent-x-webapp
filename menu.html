<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu | The Obsidian Grill</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        .bg-dark { background-color: #1a1a1a; }
        .text-gold { color: #d4af37; }
        .highlight-on-hover:hover { transform: scale(1.05); }
        .fade-in { opacity: 0; transition: opacity 0.5s ease-in-out; }
    </style>
</head>
<body class="bg-dark text-white">
    <header class="fixed top-0 w-full bg-transparent backdrop-filter backdrop-blur-md shadow-md z-50">
        <nav class="max-w-6xl mx-auto p-4 flex justify-between">
            <a href="index.html" class="text-gold text-2xl font-bold">The Obsidian Grill</a>
            <div>
                <a href="index.html" class="mr-4 hover:text-gold transition">Home</a>
                <a href="menu.html" class="mr-4 hover:text-gold transition">Menu</a>
                <a href="reservations.html" class="hover:text-gold transition">Reservations</a>
            </div>
        </nav>
    </header>
    <main class="pt-24 fade-in show">
        <section class="max-w-6xl mx-auto py-16">
            <h2 class="text-gold text-4xl font-semibold text-center mb-8">Our Menu</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                <div class="bg-white text-dark p-4 rounded-lg shadow-md highlight-on-hover">
                    <h3 class="text-xl font-bold mb-2">Ribeye Steak</h3>
                    <p class="mb-4">Juicy ribeye steak grilled to perfection.</p>
                    <span class="text-gold font-bold">$35</span>
                </div>
                <div class="bg-white text-dark p-4 rounded-lg shadow-md highlight-on-hover">
                    <h3 class="text-xl font-bold mb-2">T-bone Steak</h3>
                    <p class="mb-4">Tender T-bone steak with our special sauce.</p>
                    <span class="text-gold font-bold">$40</span>
                </div>
                <!-- More menu items here -->
            </div>
        </section>
    </main>

</html>
