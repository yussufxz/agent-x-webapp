    <style>

            font-family: 'Inter', sans-serif;
        }
        .gradient-bg {
            background: linear-gradient(135deg, #1a1a1a, #333333, #4f4f4f);

        .gold-gradient {

<body class="gradient-bg text-white">
    <!-- Navigation Bar -->
    <nav class="sticky top-0 z-50 backdrop-blur-lg bg-opacity-30 bg-black p-4 flex justify-between items-center">

        <ul class="flex space-x-8">
