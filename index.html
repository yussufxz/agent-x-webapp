<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Obsidian Grill</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3 { font-family: 'Playfair Display', serif; }
    </style>
</head>
<body class="bg-neutral-950 text-white">
    <div class="min-h-screen flex flex-col justify-center items-center relative">
        <div class="absolute inset-0 bg-gradient-to-r from-slate-900 via-purple-900 to-slate-900 opacity-60"></div>
        <h1 class="text-6xl font-bold text-center text-white mb-8 animate-fadeIn">The Obsidian Grill</h1>
        <p class="text-lg text-center mb-12 animate-fadeIn">Experience the Epitome of Gourmet in Every Bite</p>
        <button class="relative inline-flex h-12 overflow-hidden rounded-full p-[1px] focus:outline-none focus:ring-2 focus:ring-slate-400 focus:ring-offset-2 focus:ring-offset-slate-50">
            <span class="absolute inset-[-1000%] animate-[spin_2s_linear_infinite] bg-[conic-gradient(from_90deg_at_50%_50%,#E2CBFF_0%,#393BB2_50%,#E2CBFF_100%)]"></span>
            <span class="relative px-6 py-3 bg-neutral-950 rounded-full text-white">Explore Menu</span>
        </button>
    </div>
    <section class="py-16 grid grid-cols-1 md:grid-cols-3 gap-8 px-8">
        <!-- Example Menu Card -->
        <div class="backdrop-blur-md bg-white/5 border border-white/10 rounded-2xl p-6 transition duration-500 hover:scale-[1.02] hover:bg-white/10 hover:shadow-[0_0_30px_rgba(255,255,255,0.1)]">
            <h2 class="text-2xl font-bold mb-4">Grilled Tenderloin</h2>
            <p class="text-sm">With rosemary butter and seasonal vegetables</p>
            <p class="mt-4 text-lg font-semibold">$25</p>
        </div>
        <!-- Add more menu items as needed -->
    </section>
    <script>
        document.querySelectorAll('button span').forEach(span => {
            span.addEventListener('animationiteration', () => {
                span.style.animationDirection = span.style.animationDirection === 'normal' ? 'reverse' : 'normal';
            });
        });
    </script>
</body>
</html>
